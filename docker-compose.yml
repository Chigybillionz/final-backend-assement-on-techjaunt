services:
  api:
    build: .
    container_name: autolease-api

    ports:
      - "8000:8000"

    env_file:
      - .env.docker

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    restart: unless-stopped

  postgres:
    image: postgres:16-alpine

    container_name: autolease-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autolease

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

    container_name: autolease-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

volumes:
  postgres-data:
